<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur de Fin d'Année</title>
    <link rel="icon" type="image/x-icon" href="favicon2.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <style>

        :root {
            --primary: #4a20f0; /* Mis en violet pour faire le lien avec le bouton */
            --success: #a607f0;
            --success-alpha: #a607f02a;
            --bg-color: #5c5870;
            --card-bg: #ffffff;
            --text: #5c5870;
            --border: #5c5870;
            --link : #a66c00;
            --cp : #cdaa1c;
        }

        body { 
            font-family: 'Roboto Mono', monospace;
            background-color: var(--bg-color); 
            color: var(--text); 
            margin: 0; padding: 20px; display: flex; justify-content: center; 
        }

        input, button {
            font-family: 'Roboto Mono', monospace;
        }

        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
        
        h1 { text-align: center; 
            color: var(--primary); 
            font-size: 22px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }

        .note { font-size: 12px; 
            color: #7f8c8d; 
            margin-bottom: 5px; display: block; }

        .note-alert { color: #e67e22; 
            font-weight: bold; }

        input[type="number"], input[type="date"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        .cp-highlight label { 
            color:var(--cp); 
        }
        .cp-highlight input { 
            border-color:var(--cp); 
            background-color: #ffffff; 
        }
        button { width: 100%; padding: 14px; 
            background-color: var(--primary); 
            color: white; 
            border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: background-color 0.3s; 
        }
        
        button:hover { 
            background-color: var(--primary); 
        }
        .btn-calendar { 
            background-color: var(--link); 
            margin-top: 10px; }
        .btn-calendar:hover { 
            background-color: var(--cp); 
        }
        .result { margin-top: 25px; padding: 20px; 
            background-color:var(--success-alpha); 
            border-left: 5px solid var(--success); 
            border-radius: 6px; display: none; }

        .result h2 { margin-top: 0; 
            color: var(--success); 
            font-size: 18px; }
        .result p { font-size: 15px; margin: 8px 0; }
        .sub-info { font-size: 13px; color: var(--text); margin-top: -5px; margin-bottom: 10px; display: block; }
        .highlight { font-weight: bold; 
            color:var(--success); 
            font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🗓️ Quand vais-je finir mes heures ?</h1>
    
    <div class="form-group">
        <label>Date de début du calcul</label>
        <input type="date" id="currentDate">
    </div>

    <div class="form-group">
        <label>Heures totales à travailler dans l'année</label>
        <input type="number" id="totalHours" value="1764" step="0.1">
    </div>

    <div class="form-group">
        <label>Heures déjà travaillées à ce jour</label>
        <input type="number" id="workedHours" placeholder="Ex: 1050" step="0.1">
    </div>

    <div class="form-group">
        <label>Heures de modulation (en plus ou en moins)</label>
        <input type="number" id="modulation" value="0" step="0.1">
    </div>

    <div class="form-group">
        <label>Heures travaillées par jour (en moyenne)</label>
        <input type="number" id="hoursPerDay" value="7" step="0.1">
    </div>

    <div class="form-group cp-highlight">
        <label>Jours de congés posés à la fin juillet</label>
        <input type="number" id="cpDays" value="5" step="0.5">
    </div>

    <button onclick="calculerFin()">Calculer ma date de fin</button>
    <button class="btn-calendar" onclick="allerVersCalendrier()">📅 Voir en mode Calendrier interactif</button>

    <div class="result" id="resultBox">
        <h2>📊 Vos Résultats</h2>
        <p>Heures de présence restantes : <strong id="hoursLeft"></strong> h</p>
        <span class="sub-info">(Déjà déduit : <span id="cpDeducted"></span> h pour vos jours de CP)</span>
        
        <p>Jours ouvrés restants pleins : <strong id="daysLeft"></strong> jours</p>
        <hr style="border:0; border-top:1px solid var(--success); margin: 15px 0;">
        <p>Dernier jour de présence prévu le :</p>
        <p class="highlight" id="endDate"></p>
    </div>
</div>

<script>
    document.getElementById('currentDate').valueAsDate = new Date();

    function getEaster(year) {
        let a = year % 19, b = Math.floor(year / 100), c = year % 100;
        let d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25);
        let g = Math.floor((b - f + 1) / 3), h = (19 * a + b - d - g + 15) % 30;
        let i = Math.floor(c / 4), k = c % 4, l = (32 + 2 * e + 2 * i - h - k) % 7;
        let m = Math.floor((a + 11 * h + 22 * l) / 451), n = h + l - 7 * m + 114;
        return new Date(year, Math.floor(n / 31) - 1, (n % 31) + 1);
    }

    function estFerieOuWeekEnd(date) {
        let dayOfWeek = date.getDay();
        if (dayOfWeek === 0 || dayOfWeek === 6) return true;
        let y = date.getFullYear(), m = String(date.getMonth() + 1).padStart(2, '0'), d = String(date.getDate()).padStart(2, '0');
        let dateStr = `${d}-${m}`;
        let feriesFixes =['01-01', '01-05', '08-05', '14-07', '15-08', '01-11', '11-11', '25-12'];
        let easter = getEaster(y);
        let formatMobile = (dObj) => `${String(dObj.getDate()).padStart(2, '0')}-${String(dObj.getMonth() + 1).padStart(2, '0')}`;
        let lundiDePaques = new Date(easter); lundiDePaques.setDate(easter.getDate() + 1);
        let ascension = new Date(easter); ascension.setDate(easter.getDate() + 39);
        let pentecote = new Date(easter); pentecote.setDate(easter.getDate() + 50);
        return feriesFixes.includes(dateStr) ||[formatMobile(lundiDePaques), formatMobile(ascension), formatMobile(pentecote)].includes(dateStr);
    }

    function calculerFin() {
    let currentDateInput = document.getElementById('currentDate').value;
    let totalHours = parseFloat(document.getElementById('totalHours').value) || 0;
    let workedHours = parseFloat(document.getElementById('workedHours').value) || 0;
    let modulation = parseFloat(document.getElementById('modulation').value) || 0;
    let hoursPerDay = parseFloat(document.getElementById('hoursPerDay').value) || 7;
    let cpDays = parseFloat(document.getElementById('cpDays').value) || 0;

    // 1. Calcul des heures de présence pures à effectuer
    let cpHours = cpDays * hoursPerDay;
    let heuresRestantesAPresenter = totalHours - workedHours - modulation - cpHours;
    
    let resultBox = document.getElementById('resultBox');
    document.getElementById('cpDeducted').innerText = cpHours.toFixed(1);

    if (heuresRestantesAPresenter <= 0) {
        document.getElementById('hoursLeft').innerText = "0";
        document.getElementById('daysLeft').innerText = "0";
        document.getElementById('endDate').innerText = "🎉 Quota atteint ! (CP inclus)";
        resultBox.style.display = 'block';
        return;
    }

    // 2. Calcul de la Date Limite de Présence (31 Juillet - jours de CP)
    let anneeCible = new Date(currentDateInput).getFullYear();
    let deadlineFinale = new Date(anneeCible, 6, 31); // 31 Juillet
    if (new Date(currentDateInput) > deadlineFinale) deadlineFinale.setFullYear(anneeCible + 1);

    let dateLimitePresence = new Date(deadlineFinale);
    let joursCPRemontes = 0;
    while (joursCPRemontes < cpDays) {
        dateLimitePresence.setDate(dateLimitePresence.getDate() - 1);
        if (!estFerieOuWeekEnd(dateLimitePresence)) {
            joursCPRemontes++;
        }
    }

    // 3. Calcul de la date de fin réelle selon le rythme actuel
    let calculDate = new Date(currentDateInput);
    let resteAProduire = heuresRestantesAPresenter;
    let joursOuvresComptes = 0;
    while (resteAProduire > 0) {
        if (!estFerieOuWeekEnd(calculDate)) {
            resteAProduire -= hoursPerDay;
            joursOuvresComptes++;
        }
        if (resteAProduire <= 0) break;
        calculDate.setDate(calculDate.getDate() + 1);
    }

    // 4. Alerte si on dépasse la date limite de présence
    let alerteHTML = "";
    if (calculDate > dateLimitePresence) {
        let joursOuvresDisponibles = 0;
        let tempDate = new Date(currentDateInput);
        while (tempDate <= dateLimitePresence) {
            if (!estFerieOuWeekEnd(tempDate)) joursOuvresDisponibles++;
            tempDate.setDate(tempDate.getDate() + 1);
        }
        
        let tauxRequis = heuresRestantesAPresenter / joursOuvresDisponibles;
        alerteHTML = `
            <div id="deadlineAlert" style="color: #e67e22; margin-top: 15px; padding: 12px; border: 2px dashed #e67e22; border-radius: 8px; background-color: #fff9f4;">
                ⚠️ <strong>Alerte Planning :</strong><br>
                Vos CP commencent le ${dateLimitePresence.toLocaleDateString('fr-FR')}.<br>
                Pour libérer ces jours, vous devez travailler :<br>
                <strong style="font-size: 1.1em;">🚀 ${tauxRequis.toFixed(2)} h / jour</strong><br>
                au lieu de ${hoursPerDay}h.
            </div>`;
    }

    document.getElementById('hoursLeft').innerText = heuresRestantesAPresenter.toFixed(2);
    document.getElementById('daysLeft').innerText = joursOuvresComptes;
    document.getElementById('endDate').innerText = "🗓️ " + calculDate.toLocaleDateString('fr-FR', {weekday: 'long', day: 'numeric', month: 'long'});
    
    let oldAlert = document.getElementById('deadlineAlert');
    if (oldAlert) oldAlert.remove();
    resultBox.style.display = 'block';
    if (alerteHTML) resultBox.insertAdjacentHTML('beforeend', alerteHTML);
}


    function allerVersCalendrier() {
        let params = new URLSearchParams({
            startDate: document.getElementById('currentDate').value,
            totalHours: document.getElementById('totalHours').value,
            workedHours: document.getElementById('workedHours').value || 0,
            modulation: document.getElementById('modulation').value,
            defaultHours: document.getElementById('hoursPerDay').value,
            cpDays: document.getElementById('cpDays').value
        });
        window.location.href = "calendrier_heures.html?" + params.toString();
    }
</script>

</body>
</html>
